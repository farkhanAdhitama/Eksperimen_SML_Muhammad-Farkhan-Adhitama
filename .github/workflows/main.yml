name: Preprocessing CI Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn joblib

      # 4. Optional: Check current directory and ensure file exists
      - name: List files
        run: ls -lah

      # 5. Run preprocessing script
      - name: Run preprocessing script
        run: python preprocessing/automate_Muhammad_Farkhan_Adhitama.py

      # 6. Upload hasil dataset yang telah diproses
      - name: Upload preprocessed dataset
        uses: actions/upload-artifact@v4
        with:
          name: bank_customer_preprocessed
          path: bank_customer_preprocessed.csv
